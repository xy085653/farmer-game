<h2>🎨 你偏好的像素风格？</h2>
<p class="subtitle">星露谷是典型的 16-bit 顶视角像素风，但可以有不同的风格方向</p>

<div class="options">
  <div class="option" data-choice="stardew-like" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>🌿 经典星露谷风</h3>
      <p>16×16 / 32×32 像素块，顶视角俯视，色彩柔和明亮，类似星露谷物语/SNES风格</p>
      <div style="margin-top: 0.5rem; padding: 1rem; background: #2d5a27; border-radius: 8px; display: flex; gap: 2px; flex-wrap: wrap;">
        <span style="display: inline-block; width: 16px; height: 16px; background: #5a8f3c;"></span>
        <span style="display: inline-block; width: 16px; height: 16px; background: #7cb342;"></span>
        <span style="display: inline-block; width: 16px; height: 16px; background: #c8a96e;"></span>
        <span style="display: inline-block; width: 16px; height: 16px; background: #5c9bd5;"></span>
        <span style="display: inline-block; width: 16px; height: 16px; background: #e8c86a;"></span>
      </div>
      <p style="margin-top: 0.5rem; font-size: 0.9rem; color: var(--muted);">✅ 素材丰富，社区资源多，开发快</p>
    </div>
  </div>
  <div class="option" data-choice="gba-style" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>🎮 GBA 像素风</h3>
      <p>类似牧场物语 GBA 版的画风，色彩更饱和，角色比例稍大 (32×48)，细节更丰富</p>
      <div style="margin-top: 0.5rem; padding: 1rem; background: #2d3047; border-radius: 8px; display: flex; gap: 2px; flex-wrap: wrap;">
        <span style="display: inline-block; width: 16px; height: 16px; background: #66cdaa;"></span>
        <span style="display: inline-block; width: 16px; height: 16px; background: #ff8c42;"></span>
        <span style="display: inline-block; width: 16px; height: 16px; background: #d4a574;"></span>
        <span style="display: inline-block; width: 16px; height: 16px; background: #e0e0e0;"></span>
        <span style="display: inline-block; width: 16px; height: 16px; background: #ffd166;"></span>
      </div>
      <p style="margin-top: 0.5rem; font-size: 0.9rem; color: var(--muted);">✅ 视觉更丰富，角色表情更生动</p>
    </div>
  </div>
  <div class="option" data-choice="retro" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>🕹️ 极简复古风</h3>
      <p>8-bit 风格，16×16 像素块，颜色数量有限（每色板 4-8 色），复古游戏机感觉</p>
      <div style="margin-top: 0.5rem; padding: 1rem; background: #1a1a2e; border-radius: 8px; display: flex; gap: 2px; flex-wrap: wrap;">
        <span style="display: inline-block; width: 16px; height: 16px; background: #00ff41;"></span>
        <span style="display: inline-block; width: 16px; height: 16px; background: #ff0040;"></span>
        <span style="display: inline-block; width: 16px; height: 16px; background: #ffe4e1;"></span>
        <span style="display: inline-block; width: 16px; height: 16px; background: #ffd700;"></span>
        <span style="display: inline-block; width: 16px; height: 16px; background: #1e90ff;"></span>
      </div>
      <p style="margin-top: 0.5rem; font-size: 0.9rem; color: var(--muted);">✅ 开发最快，但表现力有限</p>
    </div>
  </div>
</div>
