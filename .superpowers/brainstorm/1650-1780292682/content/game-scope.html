<h2>🎮 你想先聚焦哪些核心系统？</h2>
<p class="subtitle">星露谷物语有多个子系统，全部实现需要很长时间。请选择你想要的 <strong>MVP（最小可行版本）</strong> 范围</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="farming" onclick="toggleSelect(this)">
    <div class="letter">🌾</div>
    <div class="content">
      <h3>种田系统</h3>
      <p>耕地、播种、浇水、收获、作物生长周期、季节轮换</p>
    </div>
  </div>
  <div class="option" data-choice="mining" onclick="toggleSelect(this)">
    <div class="letter">⛏️</div>
    <div class="content">
      <h3>挖矿/战斗</h3>
      <p>矿洞探索、资源采集、怪物战斗、装备系统</p>
    </div>
  </div>
  <div class="option" data-choice="fishing" onclick="toggleSelect(this)">
    <div class="letter">🎣</div>
    <div class="content">
      <h3>钓鱼系统</h3>
      <p>钓鱼小游戏、鱼类收集、不同水域</p>
    </div>
  </div>
  <div class="option" data-choice="social" onclick="toggleSelect(this)">
    <div class="letter">💑</div>
    <div class="content">
      <h3>社交/恋爱</h3>
      <p>NPC 好感度、对话系统、送礼、结婚</p>
    </div>
  </div>
  <div class="option" data-choice="crafting" onclick="toggleSelect(this)">
    <div class="letter">🔨</div>
    <div class="content">
      <h3>制作/建造</h3>
      <p>配方合成、工具升级、建筑建造、家具摆放</p>
    </div>
  </div>
  <div class="option" data-choice="economy" onclick="toggleSelect(this)">
    <div class="letter">💰</div>
    <div class="content">
      <h3>经济系统</h3>
      <p>商店买卖、出货箱、订单任务、物价波动</p>
    </div>
  </div>
</div>

<p style="margin-top: 2rem; color: var(--muted);">💡 可以先选 2-3 个核心系统起步</p>
